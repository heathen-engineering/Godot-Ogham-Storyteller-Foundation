[plugin]
name="Ogham Storyteller Foundation"
description="Godot GDExtension implementing the Ogham Storyteller narrative graph: OghamEntry/OghamOption/OghamContentKey/OghamStory authoring Resources, the OghamSession state machine (Fork routing, choice history, ReturnTo), the Storyteller engine singleton (concurrent per-story sessions), and inline-link/@Token text markup. Composes entirely with GameplayTags Foundation (GameplayTagCondition/GameplayTagOperation drive every guard and side effect) and Lexicon Foundation (dialogue text/asset resolution) via runtime Variant calls, with no compile-time dependency on either. Ported from Unity-Ogham-Storyteller-Foundation. Open-source under Apache 2.0."
author="Heathen Group"
version="1.0.4"
script="editor/OghamEditorPlugin.gd"
